name: Playwright Tests with Allure Reporting

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Clean allure-results folder
        run: rm -rf allure-results

      - name: Download Allure history from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: allure-history
          path: allure-results/history
          workflow: playwright-tests.yml
          if_no_artifact_found: warn
          workflow_conclusion: ""
          search_artifacts: true
        continue-on-error: true

      - name: Run tests
        run: pytest -v

      - name: Generate environment properties
        if: always()
        run: |
          cat > allure-results/environment.properties << EOF
          Environment=${{ vars.TEST_ENV || 'QA' }}
          Browser=Chromium
          Base.URL=${{ vars.BASE_URL || 'https://demo.playwright.dev/todomvc' }}
          Python.Version=$(python --version | cut -d' ' -f2)
          Framework=Playwright + pytest
          Build.Number=${{ github.run_number }}
          Triggered.By=${{ github.actor }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          EOF

      - name: Generate executor json
        if: always()
        run: |
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}/actions",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Copy categories json
        if: always()
        run: cp categories.json allure-results/categories.json

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Add one click open script
        if: always()
        run: |
          cat > allure-report/open_report.ps1 << 'EOF'
          Write-Host "Starting Allure Report Server..."
          Start-Process "http://localhost:8080"
          python -m http.server 8080
          EOF

      - name: Upload Allure history for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-report/history
          retention-days: 30

      - name: Upload full Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30