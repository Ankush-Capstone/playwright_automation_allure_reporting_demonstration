name: Playwright Tests with Allure Reporting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright pytest-xdist allure-pytest

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      
      - name: Clean allure-results folder
        run: rm -rf allure-results

      - name: Download Allure history from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: allure-history
          path: allure-results/history
          workflow: playwright-tests.yml
          if_no_artifact_found: warn
          workflow_conclusion: ""
        continue-on-error: true

      - name: Run tests
        run: pytest -v

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Verify history folder exists
        if: always()
        run: |
          echo "Contents of allure-report:"
          ls -la allure-report/
          echo "Contents of allure-report/history:"
          ls -la allure-report/history/ || echo "History folder does not exist"

      - name: Upload Allure history for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-report/history
          retention-days: 30

      - name: Upload full Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4